<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sim Racing Dashboard</title>
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-outer: #0a0a0a;
    --bg-dash: #111;
    --bg-cell: #1a1a1a;
    --bg-dark: #0d0d0d;
    --accent-yellow: #f5c400;
    --accent-red: #e02020;
    --accent-green: #22c55e;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-orange: #f97316;
    --text-main: #e8e8e8;
    --text-dim: #999;
    --border: #2a2a2a;
    --led-size: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1c1c1c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
  }

  .dashboard {
    background: var(--bg-dash);
    border-radius: 18px;
    border: 3px solid #222;
    box-shadow:
      0 0 0 1px #333,
      0 8px 40px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05);
    padding: 14px 16px;
    width: 640px;
    position: relative;
  }

  /* ── LED strips ── */
  .led-strip {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .led {
    width: var(--led-size);
    height: var(--led-size);
    border-radius: 50%;
    background: #222;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
    transition: background 0.1s, box-shadow 0.1s;
  }
  .led.on-red    { background: #e02020; box-shadow: 0 0 6px #e02020; }
  .led.on-yellow { background: #f5c400; box-shadow: 0 0 6px #f5c400; }
  .led.on-green  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .led.on-blue   { background: #3b82f6; box-shadow: 0 0 6px #3b82f6; }
  .led.on-cyan   { background: #06b6d4; box-shadow: 0 0 6px #06b6d4; }

  /* side LEDs */
  .side-leds {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .side-leds.left  { left: -18px; }
  .side-leds.right { right: -18px; }

  /* ── Header row ── */
  .header-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .race-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-red);
    letter-spacing: 1px;
    padding: 3px 8px;
    border: 1px solid var(--accent-red);
    border-radius: 3px;
  }

  .cond-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--text-main);
    letter-spacing: 1px;
  }

  .track-icon {
    font-size: 16px;
  }

  .apex-logo {
    flex: 1;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--text-main);
  }
  .apex-logo span { color: var(--accent-yellow); }

  .gear-display {
    width: 80px;
    height: 60px;
    background: var(--bg-dark);
    border: 1px solid #333;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--accent-yellow);
    text-shadow: 0 0 20px rgba(245,196,0,0.5);
    line-height: 1;
  }

  .lap-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .lap-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .lap-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }
  .lap-num {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-main);
    font-family: 'Orbitron', sans-serif;
  }

  .header-speed {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text-main);
    min-width: 60px;
    text-align: center;
  }

  .ac-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-blue);
    border: 1px solid var(--accent-blue);
    border-radius: 3px;
    padding: 2px 6px;
  }

  /* ── Main grid ── */
  .main-grid {
    display: grid;
    grid-template-columns: 160px 90px 1fr 180px;
    gap: 6px;
  }

  /* Telemetry panel */
  .telem-panel {
    background: var(--bg-cell);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
  }

  .telem-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid #1f1f1f;
  }
  .telem-row:last-child { border-bottom: none; }
  .telem-name {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .telem-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
    font-family: 'Orbitron', sans-serif;
  }
  .telem-val.warn { color: var(--accent-orange); }
  .telem-val.crit { color: var(--accent-red); }

  /* big gear center */
  .gear-center {
    background: var(--bg-dark);
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--accent-yellow);
    text-shadow: 0 0 30px rgba(245,196,0,0.4);
  }

  /* lap time panel */
  .laptime-panel {
    background: var(--bg-cell);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
  }
  .lt-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 2px;
  }
  .lt-time {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: 1px;
  }
  .lt-row {
    display: flex;
    gap: 12px;
    margin-top: 6px;
  }
  .lt-sub { flex: 1; }
  .lt-sub-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
  }
  .lt-sub-val.neg { color: var(--accent-green); }

  /* ── Bottom row ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 6px;
    margin-top: 6px;
  }

  .map-panel {
    background: var(--bg-cell);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
  }
  .map-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .map-cell {
    font-size: 11px;
    color: var(--text-dim);
  }
  .map-cell span {
    color: var(--text-main);
    font-weight: 700;
  }

  .tyre-panel {
    background: var(--accent-yellow);
    border-radius: 4px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .tyre-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    font-weight: 900;
    color: #000;
    letter-spacing: 1px;
  }
  .tyre-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }
  .tyre-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #000;
    text-align: center;
    background: rgba(0,0,0,0.1);
    border-radius: 2px;
    padding: 2px 6px;
  }

  .btn-panel {
    background: var(--bg-cell);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: space-around;
  }
  .btn-row {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn-gray  { background: #333; color: #aaa; }
  .btn-blue  { background: #1d4ed8; color: #fff; }
  .btn-amber { background: #d97706; color: #fff; }
  .btn-green { background: #166534; color: #4ade80; }
  .btn-red   { background: #7f1d1d; color: #fca5a5; }

  .logo-cell {
    display: flex;
    align-items: center;
  }
  .porsche-logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #c8a000 0%, #f5c400 50%, #c8a000 100%);
    border-radius: 50%;
    border: 2px solid #f5c400;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 900;
    color: #000;
    font-family: 'Orbitron', sans-serif;
  }

  /* RPM bar */
  .rpm-bar-wrap {
    grid-column: 1 / -1;
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
    border: 1px solid #2a2a2a;
  }
  .rpm-bar {
    height: 100%;
    width: 65%;
    background: linear-gradient(90deg, #22c55e 0%, #f5c400 60%, #e02020 100%);
    border-radius: 3px;
    transition: width 0.1s;
  }
</style>
</head>
<body>

<div class="dashboard">
  <!-- Side LEDs -->
  <div class="side-leds left">
    <div class="led on-blue"></div>
    <div class="led on-green"></div>
    <div class="led on-green"></div>
    <div class="led on-yellow"></div>
    <div class="led"></div>
  </div>
  <div class="side-leds right">
    <div class="led on-blue"></div>
    <div class="led on-green"></div>
    <div class="led on-green"></div>
    <div class="led on-yellow"></div>
    <div class="led"></div>
  </div>

  <!-- Top LED strip -->
  <div class="led-strip">
    <div class="led on-red"></div>
    <div class="led on-red"></div>
    <div class="led on-yellow"></div>
    <div class="led on-yellow"></div>
    <div class="led on-green"></div>
    <div class="led on-green"></div>
    <div class="led on-green"></div>
    <div class="led on-yellow"></div>
    <div class="led on-yellow"></div>
    <div class="led on-red"></div>
    <div class="led on-red"></div>
  </div>

  <!-- Header -->
  <div class="header-row">
    <div class="race-label">RACE 1</div>
    <div class="cond-label">DRY</div>
    <div class="track-icon">🏁</div>
    <div class="apex-logo"><span>McLaren</span> 720s GT3<sup style="font-size:8px"></sup></div>
    <div class="header-speed">0</div>
    <div class="lap-label">LAP</div>
    <div class="lap-num">3</div>
    <div class="ac-badge">AC-0</div>
  </div>

  <!-- RPM bar -->
  <div class="rpm-bar-wrap">
    <div class="rpm-bar" id="rpmBar"></div>
  </div>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Telemetry -->
    <div class="telem-panel">
      <div class="telem-row">
        <span class="telem-name">Oil temp</span>
        <span class="telem-val">80</span>
      </div>
      <div class="telem-row">
        <span class="telem-name">Oil press</span>
        <span class="telem-val">3.9</span>
      </div>
      <div class="telem-row">
        <span class="telem-name">Water temp</span>
        <span class="telem-val">77</span>
      </div>
      <div class="telem-row">
        <span class="telem-name">Water press</span>
        <span class="telem-val">1.8</span>
      </div>
    </div>

    <!-- Gear center -->
    <div class="gear-center">N</div>

    <!-- Lap time panel -->
    <div class="laptime-panel">
      <div>
        <div class="lt-label">Lap Time</div>
        <div class="lt-time">00:01.00</div>
      </div>
      <div class="lt-row">
        <div class="lt-sub">
          <div class="lt-label">Time Diff</div>
          <div class="lt-sub-val neg">40.00</div>
        </div>
        <div class="lt-sub">
          <div class="lt-label">Pred Lap</div>
          <div class="lt-sub-val">5:07.00</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom row -->
  <div class="bottom-row" style="margin-top:6px;">

    <!-- Map / settings left -->
    <div class="map-panel">
      <div class="map-grid">
        <div class="map-cell">MAP-<span>4</span></div>
        <div class="map-cell">TH-S <span>3</span></div>
        <div class="map-cell">S12-<span>3</span></div>
        <div class="map-cell">G12-<span>6</span></div>
      </div>
    </div>

    <!-- Tyre pressures -->
    <div class="tyre-panel">
      <div class="tyre-title">TYRE PRESS</div>
      <div class="tyre-grid">
        <div class="tyre-val">141</div>
        <div class="tyre-val">141</div>
        <div class="tyre-val">141</div>
        <div class="tyre-val">141</div>
      </div>
    </div>

    <!-- Buttons right -->
    <div class="btn-panel">
      <div class="btn-row" style="justify-content:space-between; align-items:center;">
        <div class="logo-cell">
          <div class="porsche-logo">P</div>
        </div>
        <button class="btn btn-gray">MIL</button>
        <button class="btn btn-blue">ABS-11</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-amber">TC-C 8</button>
        <button class="btn btn-green">TC-R 5</button>
      </div>
    </div>

  </div>
</div>

<script>
  console.log("JS Loaded");
  const socket = io();

  socket.on('connect', () => {
    console.log("Connected to Python Server!");
  });

  socket.on('connect_error', (err) => {
    console.log("Connection Error:", err);
  });
  

  // Cache the elements for better performance
  const speedEl = document.querySelector('.header-speed');
  const gearEl = document.querySelector('.gear-center');
  const rpmBar = document.getElementById('rpmBar');

  socket.on('new_data', function(msg) {
    console.log("Full msg:", msg);
    console.log("msg.raw:", msg.raw);
    console.log("speed:", msg.raw.speed);
    console.log("rpm:", msg.raw.rpm);
    console.log("gear:", msg.raw.gear);

    const speed = msg.raw.speed;
    const rpm   = msg.raw.rpm;
    const gear  = msg.raw.gear;

    console.log("speedEl found?", speedEl);
    console.log("gearEl found?", gearEl);
    console.log("rpmBar found?", rpmBar);

    if(speedEl) speedEl.innerText = speed;
    if(gearEl){
      //gear = parseInt(gear);
      if (gear == 0){
        gearEl.innerText = "R";
      } else if (gear == 1){
        gearEl.innerText = "N";
      } else {
        gearEl.innerText = (gear - 1).toString();
      }

    }

    const maxRpm = 8000;
    const rpmPercent = Math.min((parseInt(rpm) / maxRpm) * 100, 100);
    if(rpmBar) rpmBar.style.width = rpmPercent + "%";
  });
</script>
</body>
</html>
